<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صاحبي AI - شغال بجد</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Tahoma; background: #0a0a0a; color: white;
            min-height: 100vh; padding: 15px;
        }
        #toggleCommands {
            position: fixed; top: 50%; right: 0; transform: translateY(-50%);
            background: #00ff88; color: black; border: none;
            padding: 15px 8px; border-radius: 10px 0 0 10px; font-size: 18px; z-index: 1000;
        }
        #commandSidebar {
            position: fixed; top: 0; right: -100%; width: 90%; max-width: 340px; height: 100vh;
            background: #111; border-left: 2px solid #00ff88; padding: 15px;
            transition: 0.3s; z-index: 999; overflow-y: auto;
        }
        #commandSidebar.open { right: 0; }
    .container { max-width: 400px; margin: 0 auto; }
        h1 { font-size: 26px; margin-bottom: 5px; text-align: center; }
    .subtitle { color: #00ff88; font-size: 13px; margin-bottom: 15px; text-align: center; }
    .stats { background: #222; padding: 10px; border-radius: 12px; margin-bottom: 15px; font-size: 14px; text-align: center; }
        input { font-size: 16px; padding: 10px; border-radius: 8px; width: 100%; text-align: center; border: 2px solid #333; background: #222; color: white; margin: 6px 0; }
        button { font-size: 16px; padding: 12px; margin: 6px 0; border-radius: 10px; border: none; cursor: pointer; width: 100%; font-weight: bold; }
        #startBtn { background: #00ff88; color: black; }
        #startBtn.active { background: #ff3b30; color: white; }
        #shareBtn { background: linear-gradient(45deg, #25D366, #1877F2); color: white; }
        #testVoiceBtn { background: #ff9500; color: black; }
        #status { margin-top: 15px; font-size: 15px; color: #00ff88; min-height: 40px; text-align: center; }
        #log { background: #111; border-radius: 12px; padding: 15px; margin-top: 15px; text-align: right; font-size: 13px; max-height: 250px; overflow-y: auto; color: #aaa; }
    .heard { color: #00aaff; }
    .said { color: #00ff88; }
    .ai { color: #ff00ff; }
    .error { color: #ff3b30; font-weight: bold; }
    .cmd-item { background: #222; padding: 10px; border-radius: 8px; margin: 8px 0; font-size: 14px; }
    .cmd-item button { padding: 5px; font-size: 12px; width: auto; margin: 3px; }
    .delete { background: #ff3b30!important; }
    </style>
</head>
<body>
    <button id="toggleCommands">⚙️</button>

    <div id="commandSidebar">
        <h3 style="color:#00ff88">⚙️ الأوامر</h3>
        <button onclick="addNewCommand()" style="background:#007aff">+ أمر جديد</button>
        <div id="commandsList"></div>
        <hr style="margin:15px 0; border-color:#333">
        <h4 style="color:#ffaa00">🎙️ السجل</h4>
        <div id="recordingsList" style="max-height:200px; overflow-y:auto"></div>
        <button onclick="clearRecordings()" class="delete">مسح السجل</button>
    </div>

    <div class="container">
        <h1>صاحبي AI 🛸</h1>
        <div class="subtitle">الإصدار اللي بيتكلم بجد</div>
        <div class="stats" id="stats">جاري التحميل...</div>

        <input id="wakeWord" placeholder="كلمة التنشيط" value="يا صاحبي">
        <button id="testVoiceBtn" onclick="testVoice()">🔊 جرب الصوت الأول</button>
        <button id="startBtn">شغّل صاحبي</button>
        <button id="shareBtn">ابعت لصحابك 🚀</button>

        <div id="status">1- دوس "جرب الصوت" الأول 2- بعدين "شغل صاحبي"</div>
        <div id="log"></div>
    </div>

    <script>
        let wakeWord = "يا صاحبي";
        let isListening = false;
        let recognition;
        let isAwake = false;
        let conversationHistory = [];

        let customCommands = JSON.parse(localStorage.getItem('customCommands') || '[]');
        if(customCommands.length === 0) {
            customCommands = [
                {trigger: "صحيني", response: "حاضر هصحيك", action: "alarm"},
                {trigger: "كام الساعة", response: "", action: "time"}
            ];
            saveCommands();
        }

        let recordings = JSON.parse(localStorage.getItem('recordings') || '[]');
        const urlParams = new URLSearchParams(window.location.search);
        const refBy = urlParams.get('ref');
        let myRefCount = parseInt(localStorage.getItem('myRefCount') || '0');
        let visitCount = parseInt(localStorage.getItem('visitCount') || '0') + 1;
        localStorage.setItem('visitCount', visitCount);

        const status = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const shareBtn = document.getElementById('shareBtn');
        const wakeInput = document.getElementById('wakeWord');
        const log = document.getElementById('log');
        const stats = document.getElementById('stats');
        const sidebar = document.getElementById('commandSidebar');

        updateStats();
        renderCommands();
        renderRecordings();

        if (refBy) {
            addLog(`جاي من طرف: ${refBy}`, 'ref');
        }

        function updateStats() {
            stats.innerHTML = `انت الزائر رقم ${visitCount} | شيرت لـ ${myRefCount} صاحب`;
        }

        document.getElementById('toggleCommands').onclick = () => sidebar.classList.toggle('open');

        // زرار اختبار الصوت - ده الحل
        function testVoice() {
            speak("أيوه كده يا معلم الصوت شغال. أنا صاحبي وجاهز");
        }

        shareBtn.onclick = async () => {
            const myName = prompt("اكتب اسمك:", "صاحب جدع") || "صاحب جدع";
            const shareUrl = `${window.location.origin}${window.location.pathname}?ref=${encodeURIComponent(myName)}`;
            const shareText = `جرب البوت ده اسمه صاحبي AI. بيكلمك وبيفهمك. احنا اللي عاملينه 👇`;
            if (navigator.share) {
                try {
                    await navigator.share({ title: 'صاحبي AI', text: shareText, url: shareUrl });
                    myRefCount++; localStorage.setItem('myRefCount', myRefCount); updateStats();
                } catch(e) {}
            } else {
                window.open(`https://wa.me/?text=${encodeURIComponent(shareText + '\n' + shareUrl)}`, '_blank');
                myRefCount++; localStorage.setItem('myRefCount', myRefCount); updateStats();
            }
        };

        startBtn.onclick = () => isListening? stopListening() : startListening();

        function addLog(text, type) {
            const p = document.createElement('p');
            p.className = type;
            p.textContent = text;
            log.prepend(p);
            recordings.unshift({text, type, time: new Date().toLocaleTimeString('ar-EG')});
            if(recordings.length > 50) recordings.pop();
            localStorage.setItem('recordings', JSON.stringify(recordings));
            renderRecordings();
        }

        // دالة الصوت المتصلحة
        function speak(text) {
            addLog(`قال: ${text}`, 'said');
            try {
                window.speechSynthesis.cancel(); // وقف أي كلام قديم
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'ar-SA';
                msg.rate = 1.1;
                msg.pitch = 1;
                window.speechSynthesis.speak(msg);
            } catch(e) {
                addLog(`خطأ في الصوت: ${e}`, 'error');
            }
        }

        async function askAI(prompt) {
            addLog(`بيسأل AI: ${prompt}`, 'ai');
            status.innerText = "بفكر...";
            conversationHistory.push({role: 'user', content: prompt});
            if(conversationHistory.length > 6) conversationHistory.shift();

            try {
                const response = await fetch('https://free.churchless.tech/v1/chat/completions', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [
                            {role: 'system', content: 'انت صاحبي AI. بتتكلم عامية مصرية. خليك مفيد ومختصر ودمك خفيف. لو المستخدم اشتكى منك اعتذر وصلح نفسك.'},
                          ...conversationHistory
                        ],
                        max_tokens: 150
                    })
                });
                const data = await response.json();
                const reply = data.choices[0].message.content.trim();
                conversationHistory.push({role: 'assistant', content: reply});
                speak(reply);
                status.innerText = `خلصت. قول "${wakeWord}" تاني`;
            } catch (error) {
                addLog(`خطأ AI: ${error}`, 'error');
                speak("النت فاصل مش عارف أوصل للعقل الكوني");
                status.innerText = `فيه مشكلة نت`;
            }
        }

        function handleCommand(text) {
            addLog(`سمع: ${text}`, 'heard');
            for(let cmd of customCommands) {
                if(text.includes(cmd.trigger)) {
                    if(cmd.response) speak(cmd.response);
                    if(cmd.action === 'alarm') { const time = text.match(/(\d{1,2})/); if(time) setAlarm(time[0]); }
                    if(cmd.action === 'time') { const timeStr = new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'}); speak(`الساعة ${timeStr}`); }
                    return;
                }
            }
            askAI(text);
        }

        function setAlarm(hour) {
            const now = new Date();
            const alarmTime = new Date();
            alarmTime.setHours(parseInt(hour), 0, 0, 0);
            if (alarmTime < now) alarmTime.setDate(alarmTime.getDate() + 1);
            setTimeout(() => {
                speak("اصحى يا معلم جه معادك");
                navigator.vibrate([300, 100, 300]);
            }, alarmTime - now);
        }

        function startListening() {
            if (!('webkitSpeechRecognition' in window)) {
                speak("متصفحك مفيهوش مايك. استخدم كروم");
                addLog('المتصفح لا يدعم التعرف على الصوت', 'error');
                return;
            }
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'ar-EG';
            recognition.continuous = true;

            recognition.onstart = () => {
                isListening = true;
                startBtn.textContent = "وقف صاحبي";
                startBtn.classList.add('active');
                status.innerText = `بستناك تقول: "${wakeWord}"`;
                speak("أنا جاهز يا معلم سامعك");
            };

            recognition.onresult = (event) => {
                const text = event.results[event.results.length-1][0].transcript.trim();
                if (!isAwake && text.includes(wakeWord)) {
                    isAwake = true;
                    speak("أيوه يا صاحبي اؤمر");
                    status.innerText = "سامعك.. قول";
                } else if (isAwake) {
                    handleCommand(text);
                    isAwake = false;
                    status.innerText = `قول "${wakeWord}" تاني`;
                }
            };

            recognition.onerror = (e) => {
                addLog(`خطأ مايك: ${e.error}`, 'error');
                if(e.error === 'not-allowed') speak("اديني إذن المايك من المتصفح");
                stopListening();
            };
            recognition.onend = () => { if (isListening) recognition.start(); };
            recognition.start();
        }

        function stopListening() {
            isListening = false;
            isAwake = false;
            if (recognition) recognition.stop();
            startBtn.textContent = "شغّل صاحبي";
            startBtn.classList.remove('active');
            status.innerText = "دوس الزرار عشان أبدأ أسمعك";
        }

        function saveCommands() { localStorage.setItem('customCommands', JSON.stringify(customCommands)); renderCommands(); }
        function renderCommands() {
            document.getElementById('commandsList').innerHTML = customCommands.map((cmd, i) => `
                <div class="cmd-item">
                    <b>${cmd.trigger}</b><br><small>${cmd.response || 'رد AI'}</small><br>
                    <button onclick="editCommand(${i})">تعديل</button>
                    <button onclick="deleteCommand(${i})" class="delete">حذف</button>
                </div>`).join('');
        }
        function addNewCommand() {
            const trigger = prompt("الكلمة اللي هتقولها:"); if(!trigger) return;
            const response = prompt("الرد:"); const action = prompt("نوع الأمر: alarm, time أو فاضي", "");
            customCommands.push({trigger, response, action: action || "none"}); saveCommands();
        }
        function editCommand(i) {
            const cmd = customCommands[i];
            const trigger = prompt("عدل الكلمة:", cmd.trigger); if(!trigger) return;
            const response = prompt("عدل الرد:", cmd.response); const action = prompt("عدل النوع:", cmd.action);
            customCommands[i] = {trigger, response, action}; saveCommands();
        }
        function deleteCommand(i) { if(confirm("مسح الأمر؟")) { customCommands.splice(i, 1); saveCommands(); } }
        function renderRecordings() {
            document.getElementById('recordingsList').innerHTML = recordings.slice(0, 20).map(r => `
                <div style="background:#222; padding:8px; margin:5px 0; border-radius:6px; font-size:12px;">
                    <span style="color:#666">${r.time}</span><br><span class="${r.type}">${r.text}</span>
                </div>`).join('');
        }
        function clearRecordings() { if(confirm("مسح السجل؟")) { recordings = []; localStorage.setItem('recordings', '[]'); renderRecordings(); } }
    </script>
</body>
</html>
