<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صاحبي AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #121212;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }
    .container {
            background: #1e1e1e;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 28px;
        }
    .subtitle {
            text-align: center;
            color: #00ff88;
            margin-bottom: 30px;
            font-size: 14px;
        }
        #status {
            text-align: center;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 16px;
            color: #aaa;
            background: #2a2a2a;
            border-radius: 10px;
            min-height: 50px;
        }
    .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
    .btn:active {
            transform: scale(0.97);
        }
    .btn-ai {
            background: #00d66f;
            color: #121212;
        }
    .btn-stop {
            background: #ff3b30;
            color: white;
        }
    .btn-alarm {
            background: #007aff;
            color: white;
        }
        #alarmList {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
            max-height: 150px;
            overflow-y: auto;
        }
       .alarm-item {
            padding: 8px;
            margin-bottom: 5px;
            background: #333;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }
       .delete-alarm {
            background: #ff3b30;
            border: none;
            color: white;
            padding: 2px 8px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 👂 AI صاحبي</h1>
        <div class="subtitle">احنا صممناه سوا - حققت حلمي</div>

        <div id="status">دوس الزرار عشان أبدأ أسمعك</div>

        <button class="btn btn-ai" id="micBtn" onclick="toggleAI()">شغّل صاحبي</button>
        <button class="btn btn-alarm" onclick="setAlarmVoice()">اظبط منبه بالصوت</button>

        <div id="alarmList"></div>
    </div>

    <script>
        let recognition;
        let isListening = false;
        let isAwake = false;
        let alarms = JSON.parse(localStorage.getItem('alarms') || '[]');
        
        updateAlarmList();
        checkAlarms();

        function updateStatus(text) {
            document.getElementById('status').textContent = text;
        }

        function speak(text) {
            if (recognition) recognition.stop();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ar-EG';
            u.rate = 1.1;
            u.onstart = () => updateStatus('بتكلم...');
            u.onend = () => {
                updateStatus('سامعك...');
                if (isListening && recognition) setTimeout(() => recognition.start(), 100);
            };
            speechSynthesis.speak(u);
        }

        function toggleAI() {
            if (!isListening) {
                startListening();
            } else {
                stopListening();
            }
        }

        function startListening() {
            if (!('webkitSpeechRecognition' in window) &&!('SpeechRecognition' in window)) {
                alert('المتصفح ده مش بيدعم المايك. جرب كروم');
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'ar-EG';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                updateStatus('قول "يا صاحبي" عشان أصحى');
                document.getElementById('micBtn').textContent = 'وقف صاحبي';
                document.getElementById('micBtn').className = 'btn btn-stop';
            };

            recognition.onresult = (event) => {
                const text = event.results[event.results.length - 1][0].transcript.trim();
                
                if (!isAwake && (text.includes('يا صاحبي') || text.includes('ياصاحبي'))) {
                    isAwake = true;
                    speak('أيوه اؤمرني');
                    setTimeout(() => { isAwake = false; }, 8000);
                } else if (isAwake) {
                    handleCommand(text);
                    isAwake = false;
                }
            };

            recognition.onerror = (e) => {
                if (e.error === 'not-allowed') {
                    alert('لازم توافق على المايك');
                    stopListening();
                }
            };

            recognition.onend = () => {
                if (isListening &&!speechSynthesis.speaking) {
                    setTimeout(() => recognition.start(), 100);
                }
            };

            recognition.start();
        }

        function stopListening() {
            isListening = false;
            isAwake = false;
            if (recognition) recognition.stop();
            updateStatus('دوس الزرار عشان أبدأ أسمعك');
            document.getElementById('micBtn').textContent = 'شغّل صاحبي';
            document.getElementById('micBtn').className = 'btn btn-ai';
        }

        function handleCommand(text) {
            text = text.toLowerCase();
            
            if (text.includes('عامل ايه') || text.includes('ازيك')) {
                speak('زي الفل يا صاحبي وانت عامل ايه');
            } else if (text.includes('نكتة')) {
                speak('واحد راح للدكتور قاله بنسى كتير. قاله من امتى؟ قاله من امتى ايه؟');
            } else if (text.includes('الساعة') || text.includes('الوقت')) {
                const time = new Date().toLocaleTimeString('ar-EG');
                speak('الساعة دلوقتي ' + time);
            } else if (text.includes('صحيني') || text.includes('منبه')) {
                setAlarmFromText(text);
            } else {
                speak('مفهمتش. قول تاني');
            }
        }

        function setAlarmVoice() {
            speak('قول عايز تصحى الساعة كام');
            if (!isListening) startListening();
            isAwake = true;
        }

        function setAlarmFromText(text) {
            const numbers = text.match(/\d+/g);
            if (numbers && numbers.length > 0) {
                let hour = parseInt(numbers[0]);
                let minute = numbers[1]? parseInt(numbers[1]) : 0;
                
                if (text.includes('المسا') || text.includes('بالليل')) {
                    if (hour < 12) hour += 12;
                }
                
                const now = new Date();
                const alarmTime = new Date();
                alarmTime.setHours(hour, minute, 0, 0);
                
                if (alarmTime < now) {
                    alarmTime.setDate(alarmTime.getDate() + 1);
                }
                
                alarms.push({time: alarmTime.getTime(), text: `الساعة ${hour}:${minute.toString().padStart(2,'0')}`});
                localStorage.setItem('alarms', JSON.stringify(alarms));
                updateAlarmList();
                speak(`تمام ظبطتلك المنبه على الساعة ${hour} و ${minute}`);
            } else {
                speak('مفهمتش الساعة كام. قول تاني مثلا صحيني الساعة 7');
            }
        }

        function updateAlarmList() {
            const list = document.getElementById('alarmList');
            if (alarms.length === 0) {
                list.innerHTML = '<div style="color:#666;text-align:center">مفيش منبهات</div>';
                return;
            }
            list.innerHTML = alarms.map((alarm, i) => 
                `<div class="alarm-item">
                    <span>${alarm.text}</span>
                    <button class="delete-alarm" onclick="deleteAlarm(${i})">X</button>
                </div>`
            ).join('');
        }

        function deleteAlarm(index) {
            alarms.splice(index, 1);
            localStorage.setItem('alarms', JSON.stringify(alarms));
            updateAlarmList();
            speak('مسحت المنبه');
        }

        function checkAlarms() {
            setInterval(() => {
                const now = new Date().getTime();
                alarms = alarms.filter(alarm => {
                    if (now >= alarm.time) {
                        speak('اصحى يا معلم. الساعة بقت ' + alarm.text);
                        return false;
                    }
                    return true;
                });
                localStorage.setItem('alarms', JSON.stringify(alarms));
                updateAlarmList();
            }, 30000);
        }
    </script>
</body>
</html>
