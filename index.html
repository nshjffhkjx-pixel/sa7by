<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صاحبي</title>
    <style>
        body{background:#121212;color:#fff;font-family:Tahoma;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
      .box{background:#1e1e1e;padding:25px;border-radius:20px;width:90%;max-width:350px;text-align:center}
        h1{margin:0 0 5px 0}
      .sub{color:#00ff88;margin-bottom:20px;font-size:14px}
        #st{background:#2a2a2a;padding:15px;border-radius:10px;margin-bottom:15px;min-height:20px}
      .b{width:100%;padding:18px;border:0;border-radius:12px;font-size:18px;font-weight:bold;margin-bottom:10px;cursor:pointer}
      .b1{background:#00d66f;color:#121212}
      .b2{background:#007aff;color:#fff}
      .b3{background:#ff3b30;color:#fff}
        #al{margin-top:10px;font-size:13px;color:#999}
    </style>
</head>
<body>
    <div class="box">
        <h1>🧠 👂 صاحبي</h1>
        <div class="sub">احنا صممناه سوا</div>
        <div id="st">دوس شغّل صاحبي</div>
        <button class="b b1" id="btn" onclick="go()">شغّل صاحبي</button>
        <button class="b b2" onclick="alarm()">اظبط منبه</button>
        <div id="al"></div>
    </div>
<script>
let r,on=0,awake=0,als=JSON.parse(localStorage.getItem('a')||'[]');
upd();chk();

function st(t){document.getElementById('st').textContent=t}
function spk(t){if(r)r.stop();let u=new SpeechSynthesisUtterance(t);u.lang='ar-EG';u.onend=()=>{if(on&&r)setTimeout(()=>r.start(),200)};speechSynthesis.speak(u);st('بتكلم...')}

function go(){
if(on){on=0;if(r)r.stop();document.getElementById('btn').textContent='شغّل صاحبي';document.getElementById('btn').className='b b1';st('وقفت');return}
let SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR){alert('افتح من جوجل كروم');return}
r=new SR();r.lang='ar-EG';r.continuous=!0;
r.onstart=()=>{on=1;st('قول يا صاحبي');document.getElementById('btn').textContent='وقف صاحبي';document.getElementById('btn').className='b b3'}
r.onresult=e=>{let t=e.results[e.results.length-1][0].transcript;if(!awake&&t.includes('يا صاحبي')){awake=1;spk('ايوه اؤمر');setTimeout(()=>awake=0,8000)}else if(awake){awake=0;cmd(t)}}
r.onerror=e=>{if(e.error=='not-allowed')alert('لازم توافق على المايك')}
r.onend=()=>{if(on&&!speechSynthesis.speaking)setTimeout(()=>r.start(),200)}
r.start()
}

function cmd(t){
t=t.toLowerCase();
if(t.includes('صحيني')||t.includes('منبه')){let n=t.match(/\d+/);if(n){let h=parseInt(n[0]);let d=new Date();d.setHours(h,0,0,0);if(d<new Date())d.setDate(d.getDate()+1);als.push({t:d.getTime(),h:h});localStorage.setItem('a',JSON.stringify(als));upd();spk('تمام ظبطت المنبه الساعة '+h)}else spk('الساعة كام')}
else if(t.includes('الساعة')){spk('الساعة '+new Date().toLocaleTimeString('ar-EG'))}
else if(t.includes('عامل ايه')){spk('زي الفل وانت')}
else{spk('مفهمتش')}
}

function alarm(){spk('قول عايز تصحى الساعة كام');if(!on)go();awake=1}

function upd(){document.getElementById('al').innerHTML=als.length?'المنبهات: '+als.map(a=>a.h).join(', '):'مفيش منبهات'}

function chk(){setInterval(()=>{let n=new Date().getTime();als=als.filter(a=>{if(n>=a.t){spk('اصحى الساعة بقت '+a.h);return!1}return!0});localStorage.setItem('a',JSON.stringify(als));upd()},30000)}
</script>
</body>
</html>
